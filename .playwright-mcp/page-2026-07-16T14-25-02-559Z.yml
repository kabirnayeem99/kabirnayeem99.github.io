        - generic [ref=e76]:
          - article [ref=e77]:
            - heading "On-Device Computer Vision, ML Systems & Reliable Image Uploads at Syarah" [level=3] [ref=e78]
            - paragraph [ref=e79]: 2023 - Present
            - paragraph [ref=e80]: Conceived, planned, and delivered a lightweight, on-device ML car-photo classification system using a custom-trained 42-class MobileNetV3 LiteRT/TFLite model. Integrated across bulk upload, image validation, and live camera workflows, it significantly reduced photography time and human classification errors.
            - paragraph [ref=e81]: Built a real-time Android VIN scanner using CameraX, LiteRT, and ML Kit, with a lightweight custom-trained quantized detector and a complex VIN recognition algorithm covering OCR validation, checksum repair, and character-confusion recovery.
            - paragraph [ref=e82]: Also developed a reliable upload manager that substantially reduced image loss during transfers.
          - article [ref=e83]:
            - heading "Helped Rebuild a Leading Islamic App in Bangladesh" [level=3] [ref=e84]
            - paragraph [ref=e85]: 2022 - 2023
            - paragraph [ref=e86]: Helped modernize the Al-Hadith app, one of Bangladesh's most-downloaded Islamic apps, while maintaining the legacy Android build and supporting its Flutter rewrite for a large user base.
          - article [ref=e87]:
            - heading "Contract work and services" [level=3] [ref=e88]
            - paragraph [ref=e89]: Ongoing
            - paragraph [ref=e90]: Working with small businesses on web design, digital marketing, and Amazon FBA tooling, alongside contract development for larger products like Marriott Bonvoy, BaseHubs, PatientAccess, and Jobamax. Also integrated the Sunmi Printer SDK into a Cordova hybrid app.
