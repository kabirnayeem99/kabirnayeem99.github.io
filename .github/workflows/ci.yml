name: Astro CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "astro/package-lock.json"

      - name: Install dependencies
        working-directory: astro
        run: npm ci

      - name: Lint
        working-directory: astro
        run: npm run lint

      - name: Type check
        working-directory: astro
        run: npm run check

      - name: Unit tests
        working-directory: astro
        run: npm run test

      - name: Build
        working-directory: astro
        run: npm run build
