<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Naimul Kabir</title>
    <style>
      :root {
        --bg: #f7f0e1;
        --fg: #2f261a;
        --muted: #7a6a56;
        --border: #e7daca;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1c1917;
          --fg: #f7f0e1;
          --muted: #a89880;
          --border: #3d342a;
        }
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: system-ui, -apple-system, sans-serif;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
        gap: 1rem;
      }
      h1 {
        font-size: clamp(1.5rem, 5vw, 2.5rem);
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      p {
        color: var(--muted);
        max-width: 32ch;
        line-height: 1.6;
        font-size: 1rem;
      }
      button {
        margin-top: 0.5rem;
        background: var(--fg);
        color: var(--bg);
        border: none;
        padding: 0.6rem 1.5rem;
        font-size: 0.95rem;
        font-family: inherit;
        cursor: pointer;
        letter-spacing: 0.01em;
      }
      button:hover { opacity: 0.75; }
      .hint {
        font-size: 0.85rem;
        color: var(--muted);
        border-top: 1px solid var(--border);
        padding-top: 1rem;
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>
    <h1>You're offline</h1>
    <p>No internet connection right now. Pages you've visited before are still available.</p>
    <button onclick="window.location.reload()">Try again</button>
    <p class="hint">Tip: navigate to a page while online to make it available offline.</p>
  </body>
</html>
